<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificação</title>
</head>
<body>
    <h1>SISTEMA DE IDENTIFICAÇÃO</h1>
    Qual é seu país: <input type="text" name="txt01" id="txt01">
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="res"></div>
    <script>

        function verificar() {
            var txtver = window.document.getElementById ('txt01')
            var res = window.document.getElementById ('res')
            var pais = txtver.value
            res.innerHTML += `<p>Você vive na(o) <strong>${pais}</strong></p>`
            if (pais == 'brasil') {
                res.innerHTML += '<p> Você é <strong>BRASILEIRO</strong></p>'
            } else {
                res.innerHTML += '<p> Você é <strong>ESTRANGEIRO</strong></p>'
            }
        }
    </script>

</body>
</html>
