<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 06 Gustavo Guanabara</title>
    <style>
        body {
            background-color: rgb(133, 133, 194);
            color: white;
            font: normal 20pt Arial; /*Comentário em CSS */
        }
        h1 {
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1> <!--Comentário em HTML-->
    <p>Testando comandos</p>
    <script> 
        var n1 = Number(window.prompt("Digite Aqui um número: ")) //Number consegue diferenciar números inteiros e reais// 
        var n2 = Number(window.prompt("Digite aqui outro número: "))
        var s = (n1 + n2)
        alert(`A soma entre ${n1} e ${n2} é igual a ${s}`) // Concatenação// //(number + number) para adição// //(string + string) para concatenação// // ${} também podemos utilizar desta forma//
    </script>
</body>
</html>
